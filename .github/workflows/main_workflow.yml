name: main_workflow
on: 
  push:
    branches:
      -nodejs_linter_job
      -nodejs_jest_job

jobs:
  jobLinter:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setting node version
        uses: actions/setup-node@v2
      - name: Lint Code
        uses: github/super-linter@v3
        env: 
          DEFAULT_BRANCH: githubActions_example
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: /
          JAVASCRIPT_ES_CONFIG_FILE: .eslintrc.json
          VALIDATE_JAVASCRIPT_ES: true
    test-execution:
      runs-on: windows-latest
      steps:
        -name: Checkout Code
        uses: actions/checkout@v2
        -name: Run jest tests
        run: 
          npm install jest
          npm test        
    environment_test_execution:
          -name: Hola
          env: 
            DESTINATION_PERSON: 2DAW
          uses: actions/github-actions-hello@v1 
          with:
             who-to-greet: '${{ env.DESTINATION_PERSON}}'